const n = v => (v === "" || v === undefined || v === null) ? null : Number(v);
function calcKPIs(d) {
    const planned = n(d.planned), sets = n(d.setsPurchased), accepted = n(d.planesAccepted), attempted = n(d.planesAttempted);
    return {
        cfo: (planned && sets) ? Math.round((sets / planned) * 100) : null,
        purchaser: (sets && accepted && accepted > 0) ? Math.round((sets * 10) / accepted * 10) / 10 : null,
        builder: (attempted && accepted && attempted > 0) ? Math.round((accepted / attempted) * 100) : null,
    };
}
function kpiEarned(role, d) {
    const k = calcKPIs(d);
    if (role === "CFO") {
        const a = n(d.actualCFO) ?? k.cfo, t = n(d.thresholdCFO);
        if (a === null || t === null)
            return null;
        return a >= t;
    }
    if (role === "Purchaser") {
        const a = n(d.actualPurchaser) ?? k.purchaser, t = n(d.thresholdPurchaser);
        if (a === null || t === null)
            return null;
        return a <= t;
    }
    if (role === "Builder") {
        const a = n(d.actualBuilder) ?? k.builder, t = n(d.thresholdBuilder);
        if (a === null || t === null)
            return null;
        return a >= t;
    }
    return null;
}
function calcPhase(phase, data) {

        bonuses += (kpiEarned("Builder", data) ? (n(data.bonusBuilder) || 0) : 0);
    }

}

function useTimer(minutes) {
    const total = minutes * 60;
    const [rem, setRem] = useState(total);
    const [running, setRunning] = useState(false);
    const ref = useRef(null);
    const start = useCallback(() => { setRunning(true); ref.current = setInterval(() => setRem(r => { if (r <= 1) {
        clearInterval(ref.current);
        setRunning(false);
        return 0;
    } return r - 1; }), 1000); }, []);
    const pause = useCallback(() => { clearInterval(ref.current); setRunning(false); }, []);
    const reset = useCallback(() => { clearInterval(ref.current); setRunning(false); setRem(total); }, [total]);
    useEffect(() => () => clearInterval(ref.current), []);
    const mins = Math.floor(rem / 60), secs = rem % 60;
    return { rem, running, start, pause, reset, mins, secs, pct: total > 0 ? rem / total : 1, urgent: rem <= 30 && rem > 0, done: rem === 0, total };
}
